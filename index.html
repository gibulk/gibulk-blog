<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gibulk · blog pribadi</title>
  <!-- Font & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #faf9f6;
      color: #1e1e1e;
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 28px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.03), 0 4px 8px rgba(0, 0, 0, 0.05);
      padding: 2.5rem 2.2rem;
    }

    .blog-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      border-bottom: 1px solid #eae6df;
      padding-bottom: 1.5rem;
    }

    .brand h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 500;
      font-size: 2.8rem;
      letter-spacing: -0.5px;
      color: #1f2e3a;
    }

    .brand h1 i {
      font-size: 2.2rem;
      color: #b76e4b;
      margin-right: 6px;
    }

    .tagline {
      font-size: 1rem;
      font-weight: 400;
      color: #6b5b4f;
      margin-top: 4px;
      letter-spacing: 0.3px;
    }

    .nav-links {
      display: flex;
      gap: 2.2rem;
      font-weight: 500;
    }

    .nav-links a {
      text-decoration: none;
      color: #2c3e4e;
      font-size: 1.1rem;
      transition: color 0.15s;
      border-bottom: 2px solid transparent;
      padding-bottom: 4px;
    }

    .nav-links a:hover, .nav-links a.active {
      color: #b76e4b;
      border-bottom-color: #b76e4b;
    }

    .intro-card {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      align-items: center;
      margin-bottom: 3.2rem;
      background: #f7f5f2;
      border-radius: 24px;
      padding: 1.8rem 2.2rem;
    }

    .intro-avatar {
      font-size: 4rem;
      color: #4d5c67;
      background: #e1dcd5;
      width: 90px;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .intro-text {
      flex: 1;
    }

    .intro-text h2 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 500;
      margin-bottom: 0.3rem;
    }

    .intro-text .greeting {
      font-size: 1.1rem;
      color: #5e4e40;
    }

    .intro-highlight {
      display: flex;
      gap: 1.8rem;
      margin-top: 0.8rem;
    }

    .intro-highlight span i {
      margin-right: 8px;
      color: #b76e4b;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      font-weight: 500;
      margin: 2.5rem 0 1.8rem;
      color: #1f2e3a;
    }

    .post-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
      margin-bottom: 3rem;
    }

    .post-card {
      background: #ffffff;
      border-radius: 16px;
      transition: all 0.2s;
      border: 1px solid #f0ede8;
      padding-bottom: 1.2rem;
    }

    .post-card:hover {
      box-shadow: 0 12px 22px -8px rgba(0, 0, 0, 0.08);
      border-color: #ddd6cc;
    }

    .card-img {
      height: 150px;
      background: #e4dfd7;
      border-radius: 16px 16px 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #625b52;
      font-size: 2.2rem;
    }

    .card-content {
      padding: 1.2rem 1.2rem 0.8rem;
    }

    .card-content .category {
      font-size: 0.75rem;
      font-weight: 600;
      color: #b76e4b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .card-content h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 500;
      margin: 0.5rem 0 0.5rem;
      line-height: 1.3;
    }

    .card-content p {
      font-size: 0.9rem;
      color: #4e5b64;
      margin-bottom: 0.8rem;
    }

    .read-link {
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      color: #1f2e3a;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .read-link i {
      font-size: 0.8rem;
      transition: transform 0.2s;
    }

    .read-link:hover i {
      transform: translateX(5px);
      color: #b76e4b;
    }

    .footer-bottom {
      margin-top: 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #7b6e62;
      font-size: 0.9rem;
      border-top: 1px solid #e2dbd2;
      padding-top: 2rem;
    }

    .social i {
      margin-left: 1.2rem;
      font-size: 1.2rem;
      color: #5f554a;
      transition: color 0.15s;
      cursor: default;
    }

    .social i:hover {
      color: #b76e4b;
    }

    @media (max-width: 750px) {
      .container { padding: 1.5rem; }
      .blog-header { flex-direction: column; align-items: start; gap: 1rem; }
      .post-grid { grid-template-columns: 1fr; }
      .intro-card { flex-direction: column; align-items: flex-start; }
    }

    @media (min-width: 751px) and (max-width: 950px) {
      .post-grid { grid-template-columns: repeat(2, 1fr); }
    }

    i { color: inherit; }
    .brand i { color: #b76e4b; }
  </style>
</head>
<body>

<div class="container">
  
  <header class="blog-header">
    <div class="brand">
      <h1><i class="fas fa-pen-fancy"></i> Gibulk</h1>
      <div class="tagline">cerita, opini, dan temuan pribadi</div>
    </div>
    <div class="nav-links">
      <a href="#" class="active">Beranda</a>
      <a href="/admin/" target="_blank">Login Admin</a>
    </div>
  </header>

  <div class="intro-card">
    <div class="intro-avatar">
      <i class="fas fa-user-astronaut"></i>
    </div>
    <div class="intro-text">
      <h2>Halo, saya Gibulk.</h2>
      <div class="greeting">Menulis untuk berbagi perspektif — dari teknologi, kreativitas, hingga kehidupan sehari-hari.</div>
      <div class="intro-highlight">
        <span><i class="fas fa-map-pin"></i> Indonesia</span>
        <span><i class="fas fa-calendar-alt"></i> #KonsistenMenulis</span>
      </div>
    </div>
  </div>

  <h2 class="section-title">📄 Tulisan Terbaru</h2>
  <div class="post-grid" id="post-container">
    <!-- Artikel akan muncul di sini otomatis dari JavaScript -->
  </div>

  <footer class="footer-bottom">
    <div>© 2026 Gibulk — dibangun dengan cerita & kopi</div>
    <div class="social">
      <i class="fab fa-twitter"></i>
      <i class="fab fa-instagram"></i>
      <i class="fab fa-github"></i>
    </div>
  </footer>

</div>

<script>
  // Script untuk mengambil daftar artikel dari folder /src/posts/
  async function loadPosts() {
    try {
      const response = await fetch('/src/posts/posts.json');
      const posts = await response.json();
      const container = document.getElementById('post-container');
      
      // Urutkan berdasarkan tanggal terbaru
      posts.sort((a, b) => new Date(b.date) - new Date(a.date));
      
      container.innerHTML = posts.map(post => `
        <article class="post-card">
          <div class="card-img"><i class="fas fa-${post.icon || 'feather-alt'}"></i></div>
          <div class="card-content">
            <span class="category">${post.category || 'Umum'}</span>
            <h3>${post.title}</h3>
            <p>${post.excerpt || post.body.substring(0, 100) + '...'}</p>
            <a href="/src/posts/${post.slug}.html" class="read-link">Baca <i class="fas fa-chevron-right"></i></a>
          </div>
        </article>
      `).join('');
    } catch (e) {
      console.log("Belum ada artikel. Nanti akan muncul setelah posting pertama.");
      document.getElementById('post-container').innerHTML = '<p style="grid-column:1/-1; text-align:center;">✨ Artikel pertama akan muncul di sini setelah kamu login ke Admin dan publish tulisan pertama.</p>';
    }
  }
  loadPosts();
</script>
</body>
</html>
